<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Articles & Notes | Haktan Yılmaz</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <a href="../index.html">cd ~/home</a>
        <span style="color: #8b949e;">./articles_and_notes.sh</span>
    </header>

    <div class="docs-container">
        <div class="sidebar" id="sidebar">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Search in contents...">
            </div>
            <h3>Directory</h3>
            <div id="menu-container">
                <p style="color: #8b949e; font-size: 0.9rem;">Fetching repositories...</p>
            </div>
        </div>

        <div class="content-area">
            <div class="article-layout">
                <div class="markdown-wrapper">
                    
                    <div class="top-action-bar">
                        <div class="top-action-bar-inner">
                            <div class="left-actions">
                                <svg class="svg-icon" title="Toggle Sidebar" onclick="toggleSidebar()" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                            </div>
                            <div class="right-actions">
                                <div class="dropdown-container">
                                    <svg class="svg-icon" title="Download" onclick="toggleDownloadMenu()" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                                    <div id="downloadMenu" class="dropdown-menu">
                                        <div onclick="downloadFile('pdf')">Download as PDF</div>
                                        <div onclick="downloadFile('md')">Download as Markdown (.md)</div>
                                    </div>
                                </div>
                                <svg class="svg-icon" title="Fullscreen" onclick="toggleFullScreen()" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
                                <svg class="svg-icon" title="Toggle Theme" onclick="toggleTheme()" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                            </div>
                        </div>
                    </div>

                    <div class="markdown-body" id="content-body">
                        <p style="color: #8b949e;">Initializing connection...</p>
                    </div>

                    <div class="article-navigation" id="article-nav" style="display: none;">
                        <div class="nav-link-box prev" id="nav-prev">
                            <span class="nav-label">&#10094; Previous</span>
                            <span class="nav-title" id="nav-prev-title"></span>
                        </div>
                        <div class="nav-link-box next" id="nav-next">
                            <span class="nav-label">Next &#10095;</span>
                            <span class="nav-title" id="nav-next-title"></span>
                        </div>
                    </div>

                    <footer class="site-footer">
                        <div>By Haktan Yılmaz</div>
                        <div>© Copyright 2026.</div>
                    </footer>
                </div>
                
                <div class="toc-sidebar">
                    <h4>🗂️ Contents</h4>
                    <ul id="toc-list">
                        <li><span style="color: #8b949e; font-size: 0.85rem;">Waiting for connection...</span></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        const REPO_NAME = 'haktanylmz/notlarim'; 
        const BRANCH = 'main';
        const menuContainer = document.getElementById('menu-container');
        const contentBody = document.getElementById('content-body');
        const tocList = document.getElementById('toc-list');
        const searchInput = document.getElementById('searchInput');

        let allArticlesData = []; 
        let currentMarkdownRaw = ""; 
        let currentArticleTitle = "Document";
        let currentArticleIndex = -1;

        function downloadFile(type) {
            if (!currentMarkdownRaw) {
                alert("Please select an article first to download.");
                return;
            }
            if (type === 'md') {
                const blob = new Blob([currentMarkdownRaw], { type: 'text/markdown' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${currentArticleTitle}.md`;
                a.click();
            } else if (type === 'pdf') {
                const element = document.getElementById('content-body');
                const opt = {
                    margin: 10,
                    filename: `${currentArticleTitle}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2 },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };
                html2pdf().set(opt).from(element).save();
            }
        }

        async function loadGitHubMenu() {
            try {
                const response = await fetch(`https://api.github.com/repos/${REPO_NAME}/contents`);
                if (!response.ok) throw new Error('Repo bulunamadı veya boş.');
                const data = await response.json();
                menuContainer.innerHTML = ''; 

                const readmeTitle = 'Readme.md';
                const readmeUrl = 'https://raw.githubusercontent.com/haktanylmz/haktanylmz/main/README.md';

                const profileDiv = document.createElement('div');
                profileDiv.className = 'folder-title';
                profileDiv.innerText = '👤 Profile';
                menuContainer.appendChild(profileDiv);

                const readmeLink = document.createElement('a');
                readmeLink.className = 'file-link';
                readmeLink.innerText = readmeTitle;
                readmeLink.onclick = () => loadMarkdownContent(readmeUrl, readmeTitle, 0, true);
                menuContainer.appendChild(readmeLink);

                allArticlesData.push({ path: readmeUrl, title: readmeTitle, content: "", isCustomUrl: true });

                fetch(readmeUrl)
                    .then(res => res.text())
                    .then(text => {
                        allArticlesData[0].content = text;
                    });

                const folders = data.filter(item => item.type === 'dir');
                for (const folder of folders) {
                    const folderDiv = document.createElement('div');
                    folderDiv.className = 'folder-title';
                    folderDiv.innerText = '📁 ' + folder.name.replace(/-/g, ' ');
                    menuContainer.appendChild(folderDiv);

                    const filesResponse = await fetch(folder.url);
                    const filesData = await filesResponse.json();
                    const mdFiles = filesData.filter(file => file.name.endsWith('.md'));

                    for (const file of mdFiles) {
                        const cleanTitle = file.name.replace('.md', '').replace(/-/g, ' ');
                        const currentIndex = allArticlesData.length;
                        
                        allArticlesData.push({ path: file.path, title: cleanTitle, content: "", isCustomUrl: false });

                        const fileLink = document.createElement('a');
                        fileLink.className = 'file-link';
                        fileLink.innerText = cleanTitle;
                        fileLink.onclick = () => loadMarkdownContent(file.path, cleanTitle, currentIndex, false);
                        menuContainer.appendChild(fileLink);

                        fetch(`https://raw.githubusercontent.com/${REPO_NAME}/${BRANCH}/${file.path}`)
                            .then(res => res.text())
                            .then(text => {
                                allArticlesData[currentIndex].content = text;
                            });
                    }
                }
                
                loadMarkdownContent(readmeUrl, readmeTitle, 0, true);

            } catch (error) {
                menuContainer.innerHTML = `<p style="color: #ff7b72;">Error: ${error.message}</p>`;
            }
        }

        async function loadMarkdownContent(pathOrUrl, title, index, isCustomUrl) {
            currentArticleTitle = title;
            currentArticleIndex = index;
            contentBody.innerHTML = '<p style="color: #8b949e;">Loading data packets...</p>';
            tocList.innerHTML = '<li><span style="color: #8b949e; font-size: 0.85rem;">Analyzing headers...</span></li>';
            
            try {
                const rawUrl = isCustomUrl ? pathOrUrl : `https://raw.githubusercontent.com/${REPO_NAME}/${BRANCH}/${pathOrUrl}`;
                const response = await fetch(rawUrl);
                if (!response.ok) throw new Error('Dosya okunamadı.');

                currentMarkdownRaw = await response.text(); 
                contentBody.innerHTML = marked.parse(currentMarkdownRaw);
                
                Prism.highlightAll();
                generateTOC();
                updateNavigation();
                
                if(window.innerWidth <= 768) toggleSidebar();
                
            } catch (error) {
                contentBody.innerHTML = `<p style="color: #ff7b72;">Error: ${error.message}</p>`;
            }
        }

        function updateNavigation() {
            const navContainer = document.getElementById('article-nav');
            const prevBox = document.getElementById('nav-prev');
            const nextBox = document.getElementById('nav-next');
            const prevTitle = document.getElementById('nav-prev-title');
            const nextTitle = document.getElementById('nav-next-title');

            if (allArticlesData.length <= 1 || currentArticleIndex === -1) {
                navContainer.style.display = 'none';
                return;
            }
            
            navContainer.style.display = 'flex';

            if (currentArticleIndex > 0) {
                prevBox.style.visibility = 'visible';
                const prevItem = allArticlesData[currentArticleIndex - 1];
                prevTitle.innerHTML = `&#8592; ${prevItem.title}`;
                prevBox.onclick = () => loadMarkdownContent(prevItem.path, prevItem.title, currentArticleIndex - 1, prevItem.isCustomUrl);
            } else {
                prevBox.style.visibility = 'hidden';
            }

            if (currentArticleIndex < allArticlesData.length - 1) {
                nextBox.style.visibility = 'visible';
                const nextItem = allArticlesData[currentArticleIndex + 1];
                nextTitle.innerHTML = `${nextItem.title} &#8594;`;
                nextBox.onclick = () => loadMarkdownContent(nextItem.path, nextItem.title, currentArticleIndex + 1, nextItem.isCustomUrl);
            } else {
                nextBox.style.visibility = 'hidden';
            }
        }

        searchInput.addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            const items = document.querySelectorAll('.file-link');
            
            items.forEach(item => {
                if (item.innerText.toLowerCase().includes(term)) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });

            if(term.length > 2) {
                const results = allArticlesData.filter(art => 
                    art.content.toLowerCase().includes(term) || art.title.toLowerCase().includes(term)
                );
                
                if(results.length > 0) {
                    let html = `<h1>Search Results for "${term}"</h1>`;
                    results.forEach(res => {
                        const index = res.content.toLowerCase().indexOf(term);
                        const start = Math.max(0, index - 40);
                        const end = Math.min(res.content.length, index + 60);
                        let snippet = res.content.substring(start, end).replace(/</g, '&lt;').replace(/>/g, '&gt;');
                        
                        html += `
                            <div class="search-result-card" onclick="loadMarkdownContent('${res.path}', '${res.title}', allArticlesData.findIndex(a => a.path === '${res.path}'), ${res.isCustomUrl})">
                                <h3 style="margin-top:0;">📄 ${res.title}</h3>
                                <p style="font-size:0.9rem; color:#8b949e;">...${snippet}...</p>
                            </div>
                        `;
                    });
                    contentBody.innerHTML = html;
                    document.getElementById('article-nav').style.display = 'none';
                    tocList.innerHTML = '<li><span style="color: #8b949e; font-size: 0.85rem;">Search active...</span></li>';
                } else {
                    contentBody.innerHTML = `<h1>No results found for "${term}"</h1>`;
                    document.getElementById('article-nav').style.display = 'none';
                }
            } else if (term.length === 0) {
                const readme = allArticlesData[0];
                loadMarkdownContent(readme.path, readme.title, 0, readme.isCustomUrl);
            }
        });

        function generateTOC() {
            tocList.innerHTML = ''; 
            const headings = contentBody.querySelectorAll('h1, h2, h3');

            if (headings.length === 0) {
                tocList.innerHTML = '<li><span style="color: #8b949e; font-size: 0.85rem;">No sections found.</span></li>';
                return;
            }

            headings.forEach((heading, index) => {
                if (!heading.id) heading.id = 'section-' + index;

                const li = document.createElement('li');
                const a = document.createElement('a');
                a.href = '#' + heading.id;
                a.innerText = heading.innerText;
                
                if (heading.tagName.toLowerCase() === 'h2') {
                    a.className = 'toc-h2';
                } else if (heading.tagName.toLowerCase() === 'h3') {
                    a.className = 'toc-h3';
                }

                li.appendChild(a);
                tocList.appendChild(li);
            });

            const tocLinks = tocList.querySelectorAll('a');
            const observerOptions = {
                root: null,
                rootMargin: '-80px 0px -70% 0px',
                threshold: 0
            };

            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        tocLinks.forEach(link => link.classList.remove('active'));
                        const activeId = entry.target.id;
                        const activeLink = tocList.querySelector(`a[href="#${activeId}"]`);
                        if (activeLink) {
                            activeLink.classList.add('active');
                        }
                    }
                });
            }, observerOptions);

            headings.forEach(heading => observer.observe(heading));
        }

        window.onload = loadGitHubMenu;
    </script>
</body>
</html>
