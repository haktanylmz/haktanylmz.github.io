<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | Haktan Yılmaz</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <a href="../index.html">cd ~/home</a>
        <span style="color: #8b949e;">./fetch_projects.sh</span>
    </header>

    <div class="content-area">
        <div class="top-action-bar">
            <div class="top-action-bar-inner" style="max-width: 1000px;">
                <div class="left-actions"></div>
                <div class="right-actions">
                    <svg class="svg-icon" title="Fullscreen" onclick="toggleFullScreen()" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
                    <svg class="svg-icon" title="Toggle Theme" onclick="toggleTheme()" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </div>
            </div>
        </div>

        <div class="projects-container">
            <h1>Repositories</h1>
            <div class="projects-grid" id="projects-grid">
                <p style="color: #8b949e;">Fetching data packets from GitHub API...</p>
            </div>
        </div>
        
        <footer class="site-footer" style="max-width: 1000px; margin: 20px auto 0;">
            <div>By Haktan Yılmaz</div>
            <div>© Copyright 2026.</div>
        </footer>
    </div>

    <script src="../js/main.js"></script>
    <script>
        const username = 'haktanylmz';
        const grid = document.getElementById('projects-grid');

        const languageColors = {
            'Python': '#3572A5',
            'JavaScript': '#f1e05a',
            'HTML': '#e34c26',
            'CSS': '#563d7c',
            'Shell': '#89e051',
            'Go': '#00ADD8'
        };

        async function loadProjects() {
            try {
                const response = await fetch(`https://api.github.com/users/${username}/repos?sort=updated&per_page=12`);
                if (!response.ok) throw new Error('API request failed');
                const repos = await response.json();
                grid.innerHTML = ''; 
                const originalRepos = repos.filter(repo => !repo.fork);
                if (originalRepos.length === 0) {
                    grid.innerHTML = '<p style="color: #8b949e;">No public repositories found.</p>';
                    return;
                }
                originalRepos.forEach(repo => {
                    const langColor = languageColors[repo.language] || '#8b949e';
                    const langHtml = repo.language ? `
                        <span>
                            <i class="language-color" style="background-color: ${langColor};"></i>
                            ${repo.language}
                        </span>` : '';
                    const card = document.createElement('a');
                    card.href = repo.html_url;
                    card.target = '_blank';
                    card.className = 'project-card';
                    card.innerHTML = `
                        <div class="project-title">📁 ${repo.name}</div>
                        <div class="project-desc">${repo.description || 'No description provided.'}</div>
                        <div class="project-meta">
                            ${langHtml}
                            <span>⭐ ${repo.stargazers_count}</span>
                            <span>🍴 ${repo.forks_count}</span>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                grid.innerHTML = `<p style="color: #ff7b72;">Error: ${error.message}</p>`;
            }
        }
        window.onload = loadProjects;
    </script>
</body>
</html>
